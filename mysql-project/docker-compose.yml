version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: my-mysql-server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: my_database
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
