version: '3.8'
services:
  apache-server:
    image: httpd:latest
    container_name: my-apache
    volumes:
      - ./html:/usr/local/apache2/htdocs/

  nginx-proxy:
    image: nginx:latest
    container_name: my-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - apache-server
